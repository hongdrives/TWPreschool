<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Taiwan Preschool Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#619394;--teal-dk:#4A7475;--teal-lt:#EBF2F2;
  --ink:#1C2A2A;--grey:#5A6A6A;--mid:#8A9A9A;--border:#E2EBEB;
  --light:#F5F7F7;--white:#FFFFFF;--red:#D94F4F;--green:#3A8A5A;
  --sans:'DM Sans',-apple-system,sans-serif
}
html,body{height:100%;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--light)}
button{font-family:var(--sans);cursor:pointer}

/* ── LOGIN SCREEN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2E4E50,var(--teal-dk))}
.login-box{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
.login-logo{font-family:Georgia,serif;font-size:16px;font-weight:500;color:var(--teal-dk);margin-bottom:4px}
.login-logo small{display:block;font-family:var(--sans);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mid)}
.login-title{font-size:21px;font-weight:700;color:var(--ink);margin:20px 0 6px}
.login-sub{font-size:13px;color:var(--grey);margin-bottom:28px}
.login-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s;margin-bottom:14px}
.login-box input:focus{border-color:var(--teal)}
.login-box button{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;transition:background .15s}
.login-box button:hover{background:var(--teal-dk)}
.login-err{display:none;font-size:12.5px;color:var(--red);margin-top:10px;text-align:center}

/* ── ADMIN LAYOUT ── */
#admin-screen{display:none;height:100vh;display:none;flex-direction:column}
#admin-screen.visible{display:flex}
.adm-top{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10}
.adm-top-logo{font-size:14px;font-weight:700;color:var(--teal-dk)}
.adm-top-logo span{color:var(--mid);font-weight:400;margin-left:8px;font-size:12px}
.adm-top-right{display:flex;align-items:center;gap:12px}
.save-all-btn{background:var(--teal);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:13px;font-weight:600;transition:background .15s}
.save-all-btn:hover{background:var(--teal-dk)}
.preview-btn{background:var(--light);color:var(--ink);border:1.5px solid var(--border);border-radius:7px;padding:6px 14px;font-size:13px;font-weight:500}
.logout-btn{background:none;border:none;color:var(--mid);font-size:12.5px;padding:6px 10px}
.logout-btn:hover{color:var(--red)}
.adm-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);padding:12px 18px 6px}
.sb-btn{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 18px;font-size:13px;color:var(--grey);border-left:3px solid transparent;transition:all .12s}
.sb-btn:hover{background:var(--light);color:var(--ink)}
.sb-btn.active{background:var(--teal-lt);color:var(--teal-dk);font-weight:600;border-left-color:var(--teal)}

/* ── CONTENT AREA ── */
.content{flex:1;overflow-y:auto;padding:28px 32px}
.content-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px}
.content-sub{font-size:12.5px;color:var(--mid);margin-bottom:28px}

/* ── FIELD TABLE ── */
.field-section{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.field-section-title{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--grey);padding:13px 18px;background:var(--light);border-bottom:1px solid var(--border)}
.field-row{display:grid;grid-template-columns:200px 1fr;gap:0;border-bottom:1px solid var(--border)}
.field-row:last-child{border-bottom:none}
.field-label{padding:12px 18px;font-size:12.5px;font-weight:600;color:var(--grey);background:var(--light);display:flex;align-items:flex-start;padding-top:15px;border-right:1px solid var(--border);line-height:1.4}
.field-input{padding:10px 14px}
.field-input input,.field-input textarea,.field-input select{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s}
.field-input input:focus,.field-input textarea:focus{border-color:var(--teal)}
.field-input textarea{min-height:72px;resize:vertical;line-height:1.6}

/* ── IMAGE FIELD ── */
.img-field{padding:12px 14px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.img-preview{width:90px;height:64px;object-fit:cover;border-radius:6px;background:var(--teal-lt);flex-shrink:0;border:1px solid var(--border)}
.img-controls{flex:1;min-width:200px}
.img-controls input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12.5px;font-family:var(--sans);color:var(--ink);background:#fff;outline:none;margin-bottom:7px}
.img-controls input:focus{border-color:var(--teal)}
.img-or{font-size:11px;color:var(--mid);margin:4px 0;display:block}
.img-upload-btn{font-size:12px;color:var(--teal);border:1.5px solid var(--teal);background:none;padding:5px 12px;border-radius:6px;cursor:pointer}
.img-upload-btn:hover{background:var(--teal-lt)}
.img-note{font-size:11px;color:var(--mid);margin-top:5px}

/* ── SCHOOL ACCORDION ── */
.school-item{border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;background:#fff}
.school-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.school-hd:hover{background:var(--light)}
.school-hd-name{font-size:14px;font-weight:600;color:var(--ink)}
.school-hd-city{font-size:12px;color:var(--mid)}
.school-toggle{color:var(--teal);font-size:18px;transition:transform .2s;line-height:1}
.school-hd.open .school-toggle{transform:rotate(45deg)}
.school-body{display:none;padding:0 0 16px}
.school-body.open{display:block}

/* ── LIST EDITOR ── */
.list-editor{padding:12px 14px}
.list-item{display:flex;gap:8px;align-items:center;margin-bottom:7px}
.list-item input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--sans);color:var(--ink);outline:none}
.list-item input:focus{border-color:var(--teal)}
.list-rm{background:none;border:none;color:var(--mid);font-size:18px;line-height:1;padding:0 4px;transition:color .15s}
.list-rm:hover{color:var(--red)}
.list-add{font-size:12.5px;color:var(--teal);border:1.5px dashed var(--teal);background:none;padding:6px 14px;border-radius:6px;margin-top:4px}
.list-add:hover{background:var(--teal-lt)}

/* ── SAVE STATUS ── */
.save-status{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.save-status.show{transform:translateY(0);opacity:1}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:7px 14px;font-size:12.5px;font-weight:500;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--grey);transition:all .15s}
.tab-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.tab-btn:hover:not(.active){border-color:var(--teal);color:var(--teal)}

/* ── ADMIN LANG TAB BAR ── */
.adm-lang-bar{height:42px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:4px;flex-shrink:0}
.adm-lang-bar-label{font-size:11.5px;color:var(--mid);margin-right:8px;font-weight:500}
.adm-lang-btn{padding:5px 18px;font-size:12.5px;font-weight:500;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--grey);cursor:pointer;transition:all .15s}
.adm-lang-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:700}
.adm-lang-btn:hover:not(.active){border-color:var(--teal);color:var(--teal)}
.adm-save-lang-btn{margin-left:auto;padding:6px 18px;font-size:12.5px;font-weight:600;border-radius:6px;border:none;background:var(--teal);color:#fff;cursor:pointer;transition:background .15s}
.adm-save-lang-btn:hover{background:var(--teal-dk)}

/* ── RESP ── */
@media(max-width:640px){
  .sidebar{display:none}
  .content{padding:18px}
  .field-row{grid-template-columns:1fr}
  .field-label{border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Taiwan Preschool Exchange<small>Admin Panel</small></div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Enter your admin password to continue.</div>
    <input type="password" id="pw-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Sign In →</button>
    <div class="login-err" id="login-err">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="adm-top">
    <div class="adm-top-logo">Admin Panel <span>Taiwan Preschool Exchange</span></div>
    <div class="adm-top-right">
      <button class="preview-btn" onclick="window.open('index.html','_blank')">↗ Preview Site</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <div class="adm-lang-bar">
    <span class="adm-lang-bar-label">Editing language:</span>
    <button class="adm-lang-btn active" id="alb-en" onclick="switchAdminLang('en')">English</button>
    <button class="adm-lang-btn" id="alb-zh" onclick="switchAdminLang('zh')">繁體中文</button>
    <button class="adm-save-lang-btn" id="adm-save-lang-btn" onclick="saveAll()">Save All — EN Site</button>
  </div>
  <div class="adm-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content-area"></div>
  </div>
</div>

<div class="save-status" id="save-status">Changes saved ✓</div>

<script>
/* ──────────────────────────────────────────
   AUTH
────────────────────────────────────────── */
const ADMIN_PW = 'TWPreschoolAdmin';
const AUTH_KEY = 'tpe_admin_auth';
const CONTENT_KEY = 'tpe_content';

function tryLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    sessionStorage.setItem(AUTH_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').classList.add('visible');
    initAdmin();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function logout(){
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

if(sessionStorage.getItem(AUTH_KEY)==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').classList.add('visible');
}

function loadContent(lang){
  const key=lang==='zh'?'tpe_content_zh':'tpe_content';
  const def=lang==='zh'?DEFAULT_C_ZH:DEFAULT_C;
  const base=JSON.parse(JSON.stringify(def));
  try{
    const s=localStorage.getItem(key);
    if(!s) return base;
    const stored=JSON.parse(s);
    // Shallow-merge per top-level key so missing fields fall back to defaults
    for(const k of Object.keys(base)){
      if(stored[k]===undefined) continue;
      if(k==='programs'){
        base[k]={...base[k],...stored[k]};
      } else if(k==='about'){
        const merged={...base[k],...stored[k]};
        if((stored[k].teamVersion||0)<(base[k].teamVersion||0)){merged.team=base[k].team;merged.teamVersion=base[k].teamVersion;}
        base[k]=merged;
      } else if(typeof base[k]==='object'&&base[k]!==null&&!Array.isArray(base[k])){
        base[k]={...base[k],...stored[k]};
      } else {
        base[k]=stored[k];
      }
    }
    return base;
  }catch(e){}
  return base;
}

function fText(id, val, placeholder=''){

function fArea(id, val, placeholder=''){

function fImg(id, src, label=''){
  return `<div class="img-field">
    <img class="img-preview" id="img-prev-${id}" src="${src||''}" onerror="this.src=''" alt="${label}">
    <div class="img-controls">
      <input type="text" id="${id}" value="${esc(src)}" placeholder="Image URL or file path" onchange="setVal('${id}',this.value);document.getElementById('img-prev-${id}').src=this.value">
      <span class="img-or">— or upload from computer —</span>
      <label>
        <input type="file" accept="image/*" style="display:none" onchange="uploadImg(this,'${id}')">
        <span class="img-upload-btn">Choose File</span>
      </label>
      <div class="img-note">Changes are saved locally in your browser.</div>
    </div>
  </div>`;
}
function fSection(title, fields){
  return `<div class="field-section"><div class="field-section-title">${title}</div>${fields}</div>`;
}
function esc(v){ return (v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;') }
function fieldHeader(title,sub){
  return `<div class="content-title">${title}</div><div class="content-sub">${sub||'Edit all text content for this section. Changes apply immediately after saving.'}</div>`;
}

/* Deep-set a value in DATA using dot-path like "home.headline" */
function setVal(path, val){
  const keys = path.split('__');
  let obj = DATA;
  for(let i=0;i<keys.length-1;i++){
    if(obj[keys[i]]===undefined) obj[keys[i]]={};
    obj=obj[keys[i]];
  }
  obj[keys[keys.length-1]] = val;
}

function uploadImg(input, id){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    const b64 = e.target.result;
    document.getElementById(id).value = b64;
    document.getElementById('img-prev-'+id).src = b64;
    setVal(id, b64);
    showSaved();
  };
  reader.readAsDataURL(file);
}

function listEditor(pathPrefix, items, placeholder){
  const id = 'le_'+pathPrefix;
  return `<div class="list-editor" id="${id}">
    ${items.map((item,i)=>`
      <div class="list-item">
        <input type="text" value="${esc(item)}" placeholder="${placeholder||'Item'}"
          onchange="updateListItem('${pathPrefix}',${i},this.value)">
        <button class="list-rm" onclick="removeListItem('${pathPrefix}',${i})">×</button>
      </div>
    `).join('')}
    <button class="list-add" onclick="addListItem('${pathPrefix}','${placeholder||''}')">+ Add item</button>
  </div>`;
}

function getListByPath(path){
  const keys=path.split('__');
  let obj=DATA;
  for(const k of keys) obj=obj[k];
  return obj;
}
function setListByPath(path,arr){
  const keys=path.split('__');
  let obj=DATA;
  for(let i=0;i<keys.length-1;i++) obj=obj[keys[i]];
  obj[keys[keys.length-1]]=arr;
}

function updateListItem(path,idx,val){
  const arr=getListByPath(path);
  arr[idx]=val;
  setListByPath(path,arr);
}
function removeListItem(path,idx){
  const arr=getListByPath(path);
  arr.splice(idx,1);
  setListByPath(path,arr);
  showSection(activeSection);
}
function addListItem(path){
  const arr=getListByPath(path);
  arr.push('');
  setListByPath(path,arr);
  showSection(activeSection);
}

/* ──────────────────────────────────────────
   SCHOOL ACCORDION
────────────────────────────────────────── */
function toggleSchool(i){
  const body = document.getElementById('school-body-'+i);
  const tog = document.getElementById('school-tog-'+i);
  const hd = tog.closest('.school-hd');
  body.classList.toggle('open');
  hd.classList.toggle('open');
  tog.textContent = body.classList.contains('open') ? '×' : '+';
}

function addSchool(){
  const newSchool = {
    id: 'school-'+Date.now(),
    name:"New School",city:"City",area:"Area",
    ageRange:"2–6 years",languages:"Mandarin",
    durations:"1 – 4 weeks",priceFrom:"0",
    badge:"New",desc:"School description here.",
    features:["Feature 1"],photo:""
  };
  DATA.programs.schools.push(newSchool);
  showSection('schools');
}

function handleImgChange(path, val, previewId){
  setVal(path, val);
  const prev = document.getElementById(previewId);
  if(prev) prev.src = val;
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
function updateHeroPreview(url){
  const wrap=document.getElementById('hero-img-preview-wrap');
  const img=document.getElementById('hero-img-preview');
  if(url&&wrap&&img){wrap.style.display='block';img.src=url}
  else if(wrap){wrap.style.display='none'}
}

function initAdmin(){
  buildSidebar();
  showSection('site');
}

if(sessionStorage.getItem(AUTH_KEY)==='1'){
  initAdmin();
}
</script>
